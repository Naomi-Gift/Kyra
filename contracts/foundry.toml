[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.24"
optimizer        = true
optimizer_runs   = 200
via_ir           = false

# Celo mainnet
[rpc_endpoints]
celo        = "${CELO_RPC_URL}"
celo_alfajores = "https://alfajores-forno.celo-testnet.org"

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }

[fmt]
line_length = 100
tab_width   = 4
