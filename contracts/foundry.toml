[profile.default]
src             = "src"
out             = "out"
libs            = ["lib"]
test            = "test"
solc_version    = "0.8.20"
optimizer       = true
optimizer_runs  = 200
via_ir          = false
remappings      = ["forge-std/=lib/forge-std/src/"]

[rpc_endpoints]
celo      = "https://forno.celo.org"
alfajores = "https://alfajores-forno.celo-testnet.org"

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }

[fmt]
line_length = 100
tab_width   = 4
